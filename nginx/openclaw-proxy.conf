upstream openclaw_proxy {
    server 127.0.0.1:8000;
}

server {
    listen 443 ssl http2;
    server_name llmproxy.example.com;

    ssl_certificate     /etc/letsencrypt/live/llmproxy.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llmproxy.example.com/privkey.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://openclaw_proxy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    server_name llmproxy.example.com;
    return 301 https://$host$request_uri;
}
